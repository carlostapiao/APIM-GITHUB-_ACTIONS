name: 'CI/CD Lab 21 - Final Tapia'

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Credenciales para Terraform Provider
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: "e690edad-0257-4dec-b4c9-08e163433edb"
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # Pass de SQL para Terraform
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      # Forzar el uso de Node 24 para evitar warnings de deprecación
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Actualizado de v3 a v4

      - name: Azure Login
        uses: azure/login@v2 # Actualizado de v1 a v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3 # Actualizado de v2 a v3
        with:
          terraform_version: 1.5.0

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: acrcarlos69lm.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Actualizado a v3

      - name: Build & Push App
        uses: docker/build-push-action@v5 # Actualizado a v5
        with:
          context: ./app
          push: true
          tags: acrcarlos69lm.azurecr.io/support-app:${{ github.sha }}

      - name: Get AKS Context
        run: |
          az aks get-credentials --resource-group rg-k8s-lab --name aks-lab --overwrite-existing

      - name: Kubernetes Deploy
        run: |
          # 1. Inyectar el tag de imagen dinámico
          sed -i 's|acrcarlos69lm.azurecr.io/support-app:latest|acrcarlos69lm.azurecr.io/support-app:${{ github.sha }}|g' k8s/deployment.yaml
          
          # 2. Inyectar la contraseña real de la DB
          sed -i 's|TuPasswordSeguro123|${{ secrets.DB_PASSWORD }}|g' k8s/deployment.yaml

          kubectl apply -f k8s/
          
          # 3. Verificar despliegue
          kubectl rollout status deployment/support-app --timeout=180s

      - name: Sync NGINX IP with APIM
        run: |
          echo "Buscando IP del controlador NGINX..."
          NGINX_IP=""
          
          for i in {1..20}; do
            NGINX_IP=$(kubectl get svc -n ingress-basic ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -n "$NGINX_IP" ]; then break; fi
            echo "Esperando IP... ($i)"
            sleep 15
          done

          if [ -z "$NGINX_IP" ]; then 
            echo "Error: No se obtuvo IP pública del Ingress."
            exit 1 
          fi

          echo "IP Detectada: $NGINX_IP"

          # Actualizar el Backend de APIM
          az apim api update \
            --resource-group rg-k8s-lab \
            --service-name apimcarlos69lmv2 \
            --api-id tickets-api \
            --service-url "http://$NGINX_IP"
          
          echo "Despliegue de Carlos Tapia completado con éxito."