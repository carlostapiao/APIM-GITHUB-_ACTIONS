apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: support-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Permite que el tráfico que llega a la raíz se redirija correctamente
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Ayuda a que las rutas relativas de CSS/JS se resuelvan con la URL base
    nginx.ingress.kubernetes.io/add-base-url: "true"
    # Evita problemas de redirección infinita de barras inclinadas (trailing slashes)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      server_tokens off;
      proxy_hide_header X-Powered-By;
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: support-service
            port:
              number: 80